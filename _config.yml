# Site settings
remote_theme: ArchTaqi/light
title:       Muhammad Taqi
author:      Muhammad Taqi
description: ""
baseurl:     ""
url:         "https://archtaqi.github.io"
date_format: "%b %-d, %Y"
header_image: /images/emoji.png
header_pages:
 - blog/index.html

external_headers:

 - link: https://github.com/archtaqi
   title: Github

 - link: https://twitter.com/archtaqi
   title: Twitter

 - link: https://medium.com/@archtaqi
   title: Medium

 - link: https://www.linkedin.com/in/archtaqi
   title: LinkedIn

 - link: https://drive.google.com/file/d/1r89jiTJCGbyXLjTUnJHdoWDqUN3R6uV7/view?usp=sharing
   title: Resume

 - link: mailto:taqi.arch@gmail.com
   title: Mail


include:	
  - blog

# Use either direct GA implementation or set up GTM account
# - using both will skew your data (leave blank to not use at all)
google_analytics: ''

# Preview image for social media aka og:image and twitter:image
post_preview_image: true
enable_mathjax: true

# Social icons
twitter_username: archtaqi
email: taqi.arch@gmail.com

# Build settings
markdown: kramdown
redcarpet:
  extensions: ['smart', 'tables', 'with_toc_data']
permalink:    pretty
paginate:     4
paginate_path: "/blog/:num/"

  # https://github.com/jekyll/jekyll/issues/2938
exclude:
  - Gemfile
  - Gemfile.lock
  - Rakefile
  - README.md
  - screenshot.png
  - vendor
